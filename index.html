<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>私人出行助理</title>
<meta name="theme-color" content="#4A90D9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="出行助理">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/screens.css">
</head>
<body>
<div class="phone">

  <section id="screen-trips" class="screen active">
    <div class="screen-body"></div>
  </section>

  <section id="screen-calendar" class="screen">
    <div class="screen-body"></div>
  </section>

  <section id="screen-profile" class="screen">
    <div class="screen-body"></div>
  </section>

  <section id="screen-trip-detail" class="screen no-tab">
    <div class="screen-body"></div>
  </section>

  <nav class="tab-bar">
    <button class="tab-item active" data-screen="screen-trips">
      <span class="tab-icon">✈️</span><span class="tab-label">行程</span>
    </button>
    <button class="tab-item" data-screen="screen-calendar">
      <span class="tab-icon">📅</span><span class="tab-label">日历</span>
    </button>
    <button class="tab-item" data-screen="screen-profile">
      <span class="tab-icon">👤</span><span class="tab-label">我的</span>
    </button>
  </nav>

</div>
<script src="js/data.js"></script>
<script src="js/sync.js"></script>
<script src="js/views-main.js"></script>
<script src="js/views-trip.js"></script>
<script src="js/app.js"></script>
<script>
/* Service Worker:离线运行 + 自动更新 */
if ("serviceWorker" in navigator) {
  var swRefreshing = false;
  /* 新 SW 接管后自动刷新一次,确保拿到最新代码 */
  navigator.serviceWorker.addEventListener("controllerchange", function () {
    if (swRefreshing) return;
    swRefreshing = true;
    location.reload();
  });
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").then(function (reg) {
      reg.update();
      /* 每次切回前台时检查更新(iOS 从桌面重新打开时触发) */
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") reg.update();
      });
    });
  });
}

/* 手动检查更新(“我的 → 关于 → 检查更新”调用) */
function checkForUpdate() {
  if (!("serviceWorker" in navigator)) { alert("当前环境不支持更新检查,请直接刷新页面。"); return; }
  navigator.serviceWorker.getRegistration().then(function (reg) {
    if (!reg) { alert("请先刷新页面完成安装。"); return; }
    reg.update().then(function () {
      if (reg.installing || reg.waiting) {
        alert("发现新版本,正在更新,页面将自动刷新…");
      } else {
        alert("已是最新版本(" + (typeof APP_VERSION !== "undefined" ? APP_VERSION : "") + ")。");
      }
    }).catch(function () { alert("检查更新失败,请检查网络。"); });
  });
}
</script>
</body>
</html>
